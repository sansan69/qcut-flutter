name: Test
on: [push, pull_request]
jobs:
  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Install deps & run functions tests against emulator
        run: cd functions && npm ci && firebase emulators:exec --project demo-qcut --only firestore "npm test"
